<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ポケモン対戦記録ツール</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- ▼ マテリアルデザイン用：Google標準フォント「Roboto」を読み込み ▼ -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* ▼ マテリアルデザイン規格に合わせたカラーパレットと余白 ▼ */
        :root {
            --md-sys-color-primary: #1a73e8;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-surface: #f8f9fa;
            --md-sys-color-surface-container: #ffffff;
            --md-sys-color-on-surface: #202124;
            --md-sys-color-outline: #dadce0;
            --md-sys-color-error: #d93025;
            --md-sys-color-error-container: #fce8e6;
            --md-sys-color-success: #1e8e3e;
            --md-sys-color-success-container: #e6f4ea;
            --md-elevation-1: 0 1px 2px 0 rgba(60, 64, 67, 0.3), 0 1px 3px 1px rgba(60, 64, 67, 0.15);
            --md-elevation-2: 0 1px 2px 0 rgba(60, 64, 67, 0.3), 0 2px 6px 2px rgba(60, 64, 67, 0.15);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
            -webkit-font-smoothing: antialiased;
        }

        /* ▼ ヘッダーとリロードボタン ▼ */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 24px;
            padding: 8px 0;
        }

        .app-title {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin: 0;
            letter-spacing: 0.5px;
            padding: 0 44px;
            line-height: 1.3;
        }

        .reload-btn {
            position: absolute;
            right: 0;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5f6368;
            transition: background-color 0.2s;
        }

        .reload-btn:hover {
            background-color: rgba(0, 0, 0, 0.04);
        }

        .reload-btn:active {
            background-color: rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 16px;
            font-weight: 500;
            margin: 24px 0 12px;
            color: #5f6368;
        }

        h3 {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 12px;
            color: #202124;
        }

        /* ▼ マテリアルデザイン Card コンポーネント ▼ */
        .md-card {
            background: var(--md-sys-color-surface-container);
            border-radius: 12px;
            box-shadow: var(--md-elevation-1);
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        /* ▼ マテリアル Segmented Button (タブ) ▼ */
        .tab-container {
            display: flex;
            background: #e8eaed;
            border-radius: 24px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background: transparent;
            color: #5f6368;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--md-sys-color-surface-container);
            color: var(--md-sys-color-primary);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
        }

        /* ▼ マテリアル Outlined Text Field (検索窓) ▼ */
        .search-box {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid var(--md-sys-color-outline);
            border-radius: 4px;
            margin-bottom: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
            font-family: 'Roboto', sans-serif;
        }

        .search-box:focus {
            outline: none;
            border: 2px solid var(--md-sys-color-primary);
            padding: 13px 15px;
        }

        .search-result-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            padding: 4px;
            margin-bottom: 8px;
        }

        .poke-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        /* ▼ マテリアル Chip コンポーネント (ポケモンボタン) ▼ */
        .poke-btn {
            display: flex;
            align-items: center;
            padding: 6px 12px 6px 8px;
            border: 1px solid var(--md-sys-color-outline);
            border-radius: 16px;
            background-color: var(--md-sys-color-surface-container);
            font-size: 13px;
            font-weight: 500;
            color: #3c4043;
            cursor: pointer;
            transition: all 0.15s ease-in-out;
            font-family: 'Roboto', sans-serif;
        }

        .poke-btn:active:not(:disabled) {
            background-color: #f1f3f4;
        }

        .poke-btn.selected-opp {
            background-color: var(--md-sys-color-error-container);
            color: #c5221f;
            border-color: transparent;
        }

        .poke-btn.selected-my {
            background-color: #e8f0fe;
            color: #1967d2;
            border-color: transparent;
        }

        .poke-btn:disabled {
            opacity: 0.38;
            cursor: not-allowed;
            background-color: #f1f3f4;
            border-color: transparent;
            color: #3c4043;
        }

        img {
            width: 32px;
            height: 32px;
            object-fit: scale-down;
            margin-right: 6px;
            image-rendering: pixelated;
        }

        /* 勝敗ボタン */
        .result-container {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .result-btn {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            border: 1px solid var(--md-sys-color-outline);
            background: var(--md-sys-color-surface-container);
            cursor: pointer;
            color: #5f6368;
            transition: all 0.2s;
        }

        .result-btn.win.selected {
            border-color: transparent;
            background-color: var(--md-sys-color-success-container);
            color: #137333;
        }

        .result-btn.lose.selected {
            border-color: transparent;
            background-color: var(--md-sys-color-error-container);
            color: #c5221f;
        }

        /* ▼ マテリアル FAB / Primary Button (保存ボタン) ▼ */
        .save-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 24px;
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            cursor: pointer;
            box-shadow: var(--md-elevation-1);
            transition: box-shadow 0.2s, background-color 0.2s;
            font-family: 'Roboto', sans-serif;
            letter-spacing: 0.5px;
        }

        .save-btn:active:not(:disabled) {
            box-shadow: var(--md-elevation-2);
            background-color: #174ea6;
        }

        .save-btn:disabled {
            background-color: rgba(0, 0, 0, 0.12);
            color: rgba(0, 0, 0, 0.38);
            box-shadow: none;
            cursor: not-allowed;
        }

        /* サマリー */
        .stats-summary {
            text-align: center;
            font-size: 15px;
            color: #5f6368;
            line-height: 1.6;
        }

        .stats-summary span {
            color: var(--md-sys-color-on-surface);
            font-size: 20px;
            font-weight: 700;
            margin: 0 4px;
        }

        .sort-container {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .sort-btn {
            flex: 1;
            padding: 8px 4px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid var(--md-sys-color-outline);
            border-radius: 8px;
            background: var(--md-sys-color-surface-container);
            color: #5f6368;
            cursor: pointer;
        }

        .sort-btn.active {
            background: #e8eaed;
            color: #202124;
            border-color: #9aa0a6;
        }

        /* ▼ マテリアル Data Table ▼ */
        .table-scroll {
            max-height: 350px;
            overflow-y: auto;
            border-radius: 8px;
            border: 1px solid var(--md-sys-color-outline);
            margin-bottom: 24px;
            background: var(--md-sys-color-surface-container);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: var(--md-sys-color-surface-container);
            color: #5f6368;
            font-weight: 500;
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid var(--md-sys-color-outline);
            position: sticky;
            top: 0;
            z-index: 1;
            white-space: nowrap;
            font-size: 12px;
        }

        td {
            padding: 8px 4px;
            border-bottom: 1px solid #f1f3f4;
            text-align: center;
            vertical-align: middle;
            color: var(--md-sys-color-on-surface);
        }

        td.poke-cell {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 6px;
            text-align: left;
            border-bottom: none;
            white-space: nowrap;
            font-size: 13px;
            font-weight: 500;
        }

        .bar-wrap {
            width: 100%;
            background: #f1f3f4;
            border-radius: 4px;
            overflow: hidden;
            height: 12px;
            margin-top: 4px;
        }

        .bar-inner {
            background: var(--md-sys-color-primary);
            height: 100%;
            border-radius: 4px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 14px;
            color: #5f6368;
        }

        /* ▼ マテリアル Snackbar (トースト) ▼ */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 24px;
            border-radius: 4px;
            color: #fff;
            font-weight: 400;
            z-index: 1001;
            box-shadow: var(--md-elevation-2);
            font-size: 14px;
            animation: slideUp 0.3s ease-out;
            white-space: nowrap;
            background-color: #323232;
        }

        .toast.success {
            background-color: var(--md-sys-color-success);
        }

        .toast.error {
            background-color: var(--md-sys-color-error);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }

            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        /* セレクトボックスのモダン化 */
        select {
            padding: 10px 14px;
            border-radius: 4px;
            border: 1px solid var(--md-sys-color-outline);
            width: 100%;
            margin-top: 8px;
            font-size: 14px;
            background-color: var(--md-sys-color-surface-container);
            color: var(--md-sys-color-on-surface);
            font-family: 'Roboto', sans-serif;
        }

        /* ▼ モバイル最適化 (フローティングボトムナビゲーション) ▼ */
        @media (max-width: 600px) {
            body {
                padding-bottom: 120px;
            }

            .header-container {
                margin-bottom: 16px;
            }

            .app-title {
                font-size: 18px;
                margin: 0;
            }

            .tab-container {
                position: fixed;
                bottom: calc(24px + env(safe-area-inset-bottom));
                left: 16px;
                right: 16px;
                margin: 0;
                padding: 6px;
                background: rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
                z-index: 1000;
                border-radius: 32px;
                border: 1px solid rgba(255, 255, 255, 0.4);
            }

            .tab-btn {
                border-radius: 24px;
                padding: 12px;
                font-size: 15px;
            }

            .toast {
                bottom: 120px;
                border-radius: 8px;
            }
        }
    </style>
</head>

            const [currentTab, setCurrentTab] = React.useState('record');

            const [searchText, setSearchText] = React.useState("");

                    const response = await fetch(GAS_URL);
                    if (!response.ok) throw new Error(`通信エラー`);
                    const rawRows = await response.json();
                    const dataRows = rawRows.filter(row => {
                        if (!row || row.join("").trim() === "") return false;
                        if (row[0] === "日時" || row[4] === "勝敗") return false;
                        return true;

                    setAnalysisData(dataRows);
                    if (isManualReload) showToast("データを最新化しました", "success");
                } catch (error) {
                    showToast("データの読み込みに失敗しました");
                    if (!isManualReload) setAnalysisData([]);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleReload = () => {
                window.location.reload();
            };

            React.useEffect(() => {
                fetchAnalysisData();
            }, []);

            const filteredPokeList = fullPokeList.filter(poke => poke.name.includes(searchText) || poke.hira.includes(searchText));

            const toggleOpp6 = (id) => {
                if (selectedIds.includes(id)) {
                    setSelectedIds(selectedIds.filter(pokeId => pokeId !== id));
                    setOppLeadIds(oppLeadIds.filter(pokeId => pokeId !== id));
                    setOppBackIds(oppBackIds.filter(pokeId => pokeId !== id));
                } else {
                    if (selectedIds.length < 6) setSelectedIds([...selectedIds, id]);
                    else showToast("選べるのは6匹までです");
                }
            };

            const togglePick = (id, currentList, setCurrentList, maxCount) => {
                if (currentList.includes(id)) {
                    setCurrentList(currentList.filter(i => i !== id));
                } else {
                    if (currentList.length < maxCount) setCurrentList([...currentList, id]);
                    else showToast(`選べるのは${maxCount}匹までです`);
                }
            };

            const handleImageFallback = (e, pokeId) => {
                const target = e.target;
                const attempt = target.dataset.attempt || "0";

                if (attempt === "0") {
                    target.dataset.attempt = "1";
                    target.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-viii/icons/${pokeId}.png`;
                } else if (attempt === "1") {
                    target.dataset.attempt = "2";
                    target.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokeId}.png`;
                } else {
                    target.onerror = null;
                }
            };

            const handleSave = async () => {
                if (selectedIds.length === 0) return showToast("相手のパーティを1匹以上選んでください");
                if (oppLeadIds.length !== 2 || oppBackIds.length !== 2) return showToast("相手の先発と後発を2匹ずつ選んでください");
                if (myLeadIds.length !== 2 || myBackIds.length !== 2) return showToast("自分の先発と後発を2匹ずつ選んでください");
                if (!matchResult) return showToast("勝敗を選択してください");

                setIsSaving(true);
                const payload = {
                    opp_6: selectedIds.map(id => fullPokeList.find(p => p.id === id).name).join(", "),
                    opp_4: [...oppLeadIds, ...oppBackIds].map(id => fullPokeList.find(p => p.id === id).name).join(", "),
                    opp_lead: oppLeadIds.map(id => fullPokeList.find(p => p.id === id).name).join(", "),
                    my_4: [...myLeadIds, ...myBackIds].map(id => fullPokeList.find(p => p.id === id).name).join(", "),
                    my_lead: myLeadIds.map(id => fullPokeList.find(p => p.id === id).name).join(", "),
                    my_party: MY_PARTY_NAMES.sort().join(", "),
                    result: matchResult
                };

                const GAS_URL = "https://script.google.com/macros/s/AKfycbzgqYQQqo4C-87GpxhZZg4sSRW2w8sJTTP3SLlVraob26evKtoLCkbD6ogT8FApNPOw/exec";

                try {
                    await fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(payload) });
                    showToast("記録を保存しました", "success");
                    setSearchText(""); setSelectedIds([]); setOppLeadIds([]); setOppBackIds([]); setMyLeadIds([]); setMyBackIds([]); setMatchResult(null);
                    fetchAnalysisData();
                } catch (error) {
                    showToast("保存に失敗しました。電波環境を確認してください");
                } finally {
                    setIsSaving(false);
                }
            };

            const renderButton = (poke, list, toggleFunc, styleClass, disabledList = []) => {
                const isSelected = list.includes(poke.id);
                const isDisabled = disabledList.includes(poke.id);
                return (
                    <button
                        key={poke.name}
                        className={`poke-btn ${isSelected ? styleClass : ''}`}
                        onClick={() => { if (!isDisabled) toggleFunc(poke.id); }}
                        disabled={isDisabled}
                    >
                        <img
                            src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-vii/icons/${poke.id}.png`}
                            alt={poke.name}
                            onError={(e) => handleImageFallback(e, poke.id)}
                        />
                        {poke.name}
                    </button>
                );
            };

            const calculateStats = () => {
                const partyFilteredData = selectedParty === "すべて" ? analysisData : analysisData.filter(row => row[7] === selectedParty);
                const targetData = filterRange === 'recent10' ? partyFilteredData.slice(-10) : partyFilteredData;

                const totalMatches = targetData.length;
                const winCount = targetData.filter(row => row[4] === '勝ち').length;
                const winRate = totalMatches > 0 ? ((winCount / totalMatches) * 100).toFixed(1) : 0;

                const oppStats = {};
                const myPickCounts = {};

                targetData.forEach(row => {
                    const opp6 = row[1] ? row[1].split(", ") : [];
                    const opp4 = row[2] ? row[2].split(", ") : [];
                    const oppLead = row[6] ? row[6].split(", ") : [];
                    const hasLeadData = row[6] && String(row[6]).trim() !== "";
                    const my4 = row[3] ? row[3].split(", ") : [];

                    opp6.forEach(poke => {
                        if (!oppStats[poke]) oppStats[poke] = { name: poke, encounter: 0, pick: 0, lead: 0, validLeadMatch: 0 };
                        oppStats[poke].encounter += 1;
                        if (opp4.includes(poke)) oppStats[poke].pick += 1;
                        if (hasLeadData) {
                            oppStats[poke].validLeadMatch += 1;
                            if (oppLead.includes(poke)) oppStats[poke].lead += 1;
                        }
                    });

                    my4.forEach(poke => {
                        myPickCounts[poke] = (myPickCounts[poke] || 0) + 1;
                    });
                });

                let statsArray = Object.values(oppStats).map(s => {
                    const pokeData = fullPokeList.find(p => p.name === s.name);
                    return {
                        name: s.name, id: pokeData ? pokeData.id : 0, encounter: s.encounter,
                        pickRate: s.encounter > 0 ? (s.pick / s.encounter) * 100 : 0,
                        leadRate: s.validLeadMatch > 0 ? (s.lead / s.validLeadMatch) * 100 : 0
                    };
                });

                if (sortTarget === 'encounter') statsArray.sort((a, b) => b.encounter - a.encounter || b.pickRate - a.pickRate);
                else if (sortTarget === 'pick') statsArray.sort((a, b) => b.pickRate - a.pickRate || b.encounter - a.encounter);
                else if (sortTarget === 'lead') statsArray.sort((a, b) => b.leadRate - a.leadRate || b.encounter - a.encounter);

                const myStatsArray = Object.entries(myPickCounts).map(([name, count]) => ({
                    name, count, id: fullPokeList.find(p => p.name === name)?.id || 0
                })).sort((a, b) => b.count - a.count);

                return { totalMatches, winCount, winRate, statsArray, myStatsArray };
            };

            const stats = calculateStats();
            const partyList = ["すべて", ...new Set(analysisData.map(row => row[7]).filter(Boolean))];

            return (
                <div>
                    <div className="header-container">
                        <div className="app-title">ポケモンチャンピオンズ バトル記録</div>
                        <button className="reload-btn" onClick={handleReload} title="データを最新化">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                                <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
                            </svg>
                        </button>
                    </div>

                    <div className="tab-container">
                        <button className={`tab-btn ${currentTab === 'record' ? 'active' : ''}`} onClick={() => setCurrentTab('record')}>記録</button>
                        <button className={`tab-btn ${currentTab === 'analysis' ? 'active' : ''}`} onClick={() => setCurrentTab('analysis')}>分析</button>
                    </div>

                    {currentTab === 'record' ? (
                        <div>
                            <h2>相手のパーティを選択（{selectedIds.length} / 6匹）</h2>
                            <div className="md-card">
                                <input type="text" className="search-box" placeholder="ひらがなで検索..." value={searchText} onChange={(e) => setSearchText(e.target.value)} />
                                <div className="search-result-container">
                                    {filteredPokeList.map(poke => renderButton(poke, selectedIds, toggleOpp6, 'selected-opp'))}
                                </div>
                            </div>

                            <h2>選出と結果を記録</h2>
                            <div className="md-card">
                                <h3>相手の選出</h3>
                                <p style={{ fontSize: '12px', color: '#5f6368', margin: '0 0 8px 0' }}>先発 (2匹)</p>
                                <div className="poke-container">
                                    {selectedIds.map(id => fullPokeList.find(p => p.id === id)).map(poke => renderButton(poke, oppLeadIds, (id) => togglePick(id, oppLeadIds, setOppLeadIds, 2), 'selected-opp', oppBackIds))}
                                </div>
                                <p style={{ fontSize: '12px', color: '#5f6368', margin: '0 0 8px 0' }}>後発 (2匹)</p>
                                <div className="poke-container">
                                    {selectedIds.map(id => fullPokeList.find(p => p.id === id)).map(poke => renderButton(poke, oppBackIds, (id) => togglePick(id, oppBackIds, setOppBackIds, 2), 'selected-opp', oppLeadIds))}
                                </div>

                                <hr style={{ border: 'none', borderTop: '1px solid var(--md-sys-color-outline)', margin: '20px 0' }} />

                                <h3>自分の選出</h3>
                                <p style={{ fontSize: '12px', color: '#5f6368', margin: '0 0 8px 0' }}>先発 (2匹)</p>
                                <div className="poke-container">
                                    {myPartyList.map(poke => renderButton(poke, myLeadIds, (id) => togglePick(id, myLeadIds, setMyLeadIds, 2), 'selected-my', myBackIds))}
                                </div>
                                <p style={{ fontSize: '12px', color: '#5f6368', margin: '0 0 8px 0' }}>後発 (2匹)</p>
                                <div className="poke-container">
                                    {myPartyList.map(poke => renderButton(poke, myBackIds, (id) => togglePick(id, myBackIds, setMyBackIds, 2), 'selected-my', myLeadIds))}
                                </div>
                            </div>

                            <h2>勝敗と保存</h2>
                            <div className="result-container">
                                <button className={`result-btn win ${matchResult === '勝ち' ? 'selected' : ''}`} onClick={() => setMatchResult('勝ち')}>勝ち</button>
                                <button className={`result-btn lose ${matchResult === '負け' ? 'selected' : ''}`} onClick={() => setMatchResult('負け')}>負け</button>
                            </div>

                            <button className="save-btn" onClick={handleSave} disabled={isSaving}>
                                {isSaving ? "保存中..." : "記録を保存する"}
                            </button>
                        </div>
                    ) : (
                        <div>
                            {isLoading ? (
                                <div className="loading">データを読み込み中...</div>
                            ) : stats.totalMatches === 0 && selectedParty === "すべて" ? (
                                <div className="loading">まだ対戦データがありません。</div>
                            ) : (
                                <div>
                                    <div className="md-card" style={{ padding: '16px 20px', marginBottom: '24px' }}>
                                        <h3 style={{ marginTop: 0, marginBottom: '16px' }}>分析フィルター</h3>

                                        <label style={{ fontWeight: '500', fontSize: '12px', color: '#5f6368', display: 'block', marginBottom: '4px' }}>対象パーティ</label>
                                        <select
                                            value={selectedParty}
                                            onChange={(e) => setSelectedParty(e.target.value)}
                                            style={{ marginBottom: '20px', marginTop: 0 }}
                                        >
                                            {partyList.map((party, idx) => (
                                                <option key={idx} value={party}>{party}</option>
                                            ))}
                                        </select>

                                        <label style={{ fontWeight: '500', fontSize: '12px', color: '#5f6368', display: 'block', marginBottom: '8px' }}>集計範囲</label>
                                        <div style={{ display: 'flex', gap: '8px' }}>
                                            <button
                                                className={`sort-btn ${filterRange === 'all' ? 'active' : ''}`}
                                                onClick={() => setFilterRange('all')}
                                                style={{ padding: '10px', fontSize: '14px', borderRadius: '8px', margin: 0 }}
                                            >全期間</button>
                                            <button
                                                className={`sort-btn ${filterRange === 'recent10' ? 'active' : ''}`}
                                                onClick={() => setFilterRange('recent10')}
                                                style={{ padding: '10px', fontSize: '14px', borderRadius: '8px', margin: 0 }}
                                            >直近10戦</button>
                                        </div>
                                    </div>

                                    <div className="md-card stats-summary">
                                        集計対戦数<span>{stats.totalMatches}</span>戦 / 勝ち<span>{stats.winCount}</span>勝<br />
                                        勝率<span>{stats.winRate}</span>%
                                    </div>

                                    <h2>相手のポケモンの選出率・先発率</h2>
                                    <div className="sort-container">
                                        <button className={`sort-btn ${sortTarget === 'encounter' ? 'active' : ''}`} onClick={() => setSortTarget('encounter')}>遭遇回数</button>
                                        <button className={`sort-btn ${sortTarget === 'pick' ? 'active' : ''}`} onClick={() => setSortTarget('pick')}>選出率</button>
                                        <button className={`sort-btn ${sortTarget === 'lead' ? 'active' : ''}`} onClick={() => setSortTarget('lead')}>先発率</button>
                                    </div>

                                    <div className="table-scroll">
                                        <table>
                                            <thead>
                                                <tr>
                                                    <th>ポケモン</th>
                                                    <th>遭遇</th>
                                                    <th>選出</th>
                                                    <th>先発</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {stats.statsArray.map((s) => (
                                                    <tr key={s.name}>
                                                        <td className="poke-cell">
                                                            <img
                                                                src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-vii/icons/${s.id}.png`}
                                                                onError={(e) => handleImageFallback(e, s.id)}
                                                            />
                                                            {s.name}
                                                        </td>
                                                        <td>{s.encounter}</td>
                                                        <td>{s.pickRate.toFixed(0)}%</td>
                                                        <td>{s.leadRate.toFixed(0)}%</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>

                                    <h2>自分のポケモンの選出回数</h2>
                                    <div className="table-scroll">
                                        <table>
                                            <tbody>
                                                {stats.myStatsArray.map((s) => (
                                                    <tr key={s.name}>
                                                        <td className="poke-cell" style={{ width: '35%' }}>
                                                            <img
                                                                src={`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-vii/icons/${s.id}.png`}
                                                                onError={(e) => handleImageFallback(e, s.id)}
                                                            />
                                                            {s.name}
                                                        </td>
                                                        <td style={{ width: '65%', textAlign: 'left', paddingRight: '12px' }}>
                                                            <div style={{ fontSize: '12px', color: '#5f6368', marginBottom: '2px' }}>{s.count}回 ({stats.totalMatches > 0 ? ((s.count / stats.totalMatches) * 100).toFixed(0) : 0}%)</div>
                                                            <div className="bar-wrap">
                                                                <div className="bar-inner" style={{ width: `${(s.count / stats.totalMatches) * 100}%` }}></div>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {toast && (
                        <div className={`toast ${toast.type}`}>
                            {toast.message}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
